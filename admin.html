<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูลการประเมิน - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c2f 0%, #2d5a45 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            background: rgba(0, 0, 0, 0.3);
            padding: 30px;
            border-radius: 15px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls button,
        .controls select {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #4CAF50;
            color: white;
        }

        .btn-primary:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .btn-secondary {
            background: #2196F3;
            color: white;
        }

        .btn-secondary:hover {
            background: #0b7dda;
            transform: scale(1.05);
        }

        .btn-danger {
            background: #f44336;
            color: white;
        }

        .btn-danger:hover {
            background: #da190b;
            transform: scale(1.05);
        }

        select {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border: 2px solid #4CAF50;
            padding: 10px;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(76, 175, 80, 0.2);
            border-left: 5px solid #4CAF50;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #81d4fa;
        }

        .table-wrapper {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: rgba(0, 0, 0, 0.5);
        }

        th {
            padding: 20px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #4CAF50;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        tbody tr:hover {
            background: rgba(76, 175, 80, 0.1);
        }

        .score-good {
            color: #81d4fa;
            font-weight: bold;
        }

        .score-medium {
            color: #FFD54F;
            font-weight: bold;
        }

        .score-low {
            color: #EF5350;
            font-weight: bold;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.7);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            color: #333;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #1e3c2f;
        }

        .modal-content p {
            margin: 10px 0;
            line-height: 1.6;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            margin-bottom: 20px;
            padding-bottom: 15px;
        }

        .close-btn {
            background: #f44336;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2em;
        }

        .close-btn:hover {
            background: #da190b;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
            }

            table {
                font-size: 0.9em;
            }

            th, td {
                padding: 10px;
            }

            .stat-card {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 ระบบจัดการข้อมูลการประเมิน</h1>
            <p>Carbon Footprint for School - Admin Dashboard</p>
        </header>

        <div class="stats-container" id="statsContainer">
            <!-- โหลดสถิติจาก JavaScript -->
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="refreshData()">🔄 รีเฟรชข้อมูล</button>
            <select id="categoryFilter" onchange="filterByCategory()">
                <option value="">📋 ทั้งหมด</option>
                <option value="แบบทดสอบก่อนเรียน">📚 แบบทดสอบก่อนเรียน</option>
                <option value="แบบทดสอบหลังเรียน">✅ แบบทดสอบหลังเรียน</option>
                <option value="แบบประเมินความพึงพอใจ">📝 แบบประเมิน</option>
            </select>
            <button class="btn-secondary" onclick="downloadCSV()">📥 ดาวน์โหลด CSV</button>
            <button class="btn-secondary" onclick="downloadTXT()">📥 ดาวน์โหลด TXT</button>
            <button class="btn-danger" onclick="backToHome()">🏠 กลับหน้าหลัก</button>
        </div>

        <div class="table-wrapper">
            <div id="tableContainer" class="loading">
                <div class="spinner"></div>
                <p>กำลังโหลดข้อมูล...</p>
            </div>
        </div>

        <div class="footer">
            <p>© 2025 Carbon Footprint for School - Admin System</p>
        </div>
    </div>

    <!-- Modal สำหรับแสดงรายละเอียด -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>รายละเอียดการประเมิน</h2>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div id="modalDetails"></div>
        </div>
    </div>

    <script>
        let allData = [];
        const API_URL = '/api';

        // โหลดข้อมูลเมื่อเรียกหน้า
        document.addEventListener('DOMContentLoaded', () => {
            refreshData();
            loadStats();
        });

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/stats`);
                const stats = await response.json();

                let html = `
                    <div class="stat-card">
                        <h3>📊 จำนวนการประเมินทั้งหมด</h3>
                        <div class="stat-value">${stats.totalCount}</div>
                    </div>
                    <div class="stat-card">
                        <h3>⭐ คะแนนเฉลี่ยรวม</h3>
                        <div class="stat-value">${stats.avgScore}</div>
                    </div>
                `;

                Object.keys(stats.categories).forEach(cat => {
                    const catData = stats.categories[cat];
                    const catName = cat === 'แบบทดสอบก่อนเรียน' ? '📚 ก่อนเรียน' : 
                                   cat === 'แบบทดสอบหลังเรียน' ? '✅ หลังเรียน' : 
                                   cat === 'แบบประเมินความพึงพอใจ' ? '📝 ประเมิน' :
                                   cat === 'survey' ? '📝 แบบประเมิน' : cat;
                    html += `
                        <div class="stat-card">
                            <h3>${catName}</h3>
                            <div class="stat-value">${catData.count}</div>
                            <p style="margin-top: 10px;">เฉลี่ย: ${(catData.avgScore).toFixed(2)}</p>
                        </div>
                    `;
                });

                document.getElementById('statsContainer').innerHTML = html;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        async function refreshData() {
            try {
                document.getElementById('tableContainer').innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>กำลังโหลดข้อมูล...</p>
                    </div>
                `;

                const response = await fetch(`${API_URL}/assessments`);
                allData = await response.json();
                displayData(allData);
                loadStats();
            } catch (error) {
                document.getElementById('tableContainer').innerHTML = `
                    <div class="no-data">
                        <p>❌ เกิดข้อผิดพลาดในการโหลดข้อมูล</p>
                        <p>${error.message}</p>
                    </div>
                `;
                console.error('Error:', error);
            }
        }

        function displayData(data) {
            if (data.length === 0) {
                document.getElementById('tableContainer').innerHTML = `
                    <div class="no-data">
                        <p>📭 ยังไม่มีข้อมูลการประเมิน</p>
                    </div>
                `;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ลำดับที่</th>
                            <th>ชื่อ-สกุล</th>
                            <th>อีเมล</th>
                            <th>เบอร์โทร</th>
                            <th>หมวดหมู่</th>
                            <th>คะแนน</th>
                            <th>วันที่</th>
                            <th>การจัดการ</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach((item, index) => {
                const scoreClass = item.avg_score >= 0.7 ? 'score-good' : 
                                  item.avg_score >= 0.5 ? 'score-medium' : 'score-low';
                const categoryName = item.category === 'แบบทดสอบก่อนเรียน' ? '📚 ก่อนเรียน' : 
                                    item.category === 'แบบทดสอบหลังเรียน' ? '✅ หลังเรียน' : 
                                    item.category === 'แบบประเมินความพึงพอใจ' ? '📝 ประเมิน' : 
                                    item.category === 'survey' ? '📝 แบบประเมิน' : item.category;
                const createdDate = item.created_at || item.createdAt;
                const date = new Date(createdDate).toLocaleDateString('th-TH', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.name}</td>
                        <td>${item.email}</td>
                        <td>${item.phone || '-'}</td>
                        <td>${categoryName}</td>
                        <td class="${scoreClass}">${(item.avg_score * 5).toFixed(2)}</td>
                        <td>${date}</td>
                        <td>
                            <button class="btn-primary" onclick="showDetail(${item.id})" style="font-size: 0.8em; padding: 5px 10px;">
                                ดู
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            document.getElementById('tableContainer').innerHTML = html;
        }

        function filterByCategory() {
            const category = document.getElementById('categoryFilter').value;
            if (category === '') {
                displayData(allData);
            } else {
                const filtered = allData.filter(item => item.category === category);
                displayData(filtered);
            }
        }

        function showDetail(id) {
            const item = allData.find(x => x.id === id);
            if (!item) return;

            const createdDate = item.created_at || item.createdAt;
            let html = `
                <p><strong>ชื่อ-สกุล:</strong> ${item.name}</p>
                <p><strong>อีเมล:</strong> ${item.email}</p>
                <p><strong>เบอร์โทร:</strong> ${item.phone || '-'}</p>
                <p><strong>หมวดหมู่:</strong> ${item.category}</p>
                <p><strong>คะแนนเฉลี่ย:</strong> ${(item.avg_score * 5).toFixed(2)}</p>
                <p><strong>วันที่:</strong> ${new Date(createdDate).toLocaleString('th-TH')}</p>
            `;

            if (item.comment) {
                html += `<p><strong>ความเห็น/บันทึก:</strong> ${item.comment}</p>`;
            }

            if (item.answers && Array.isArray(item.answers) && item.answers.length > 0) {
                html += `<p><strong>คำตอบ:</strong></p><pre style="background: rgba(0,0,0,0.3); padding: 10px; border-radius: 5px; color: #81d4fa; max-height: 300px; overflow-y: auto;">${JSON.stringify(item.answers, null, 2)}</pre>`;
            }

            document.getElementById('modalDetails').innerHTML = html;
            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        function downloadCSV() {
            window.location.href = `${API_URL}/export/csv`;
        }

        function downloadTXT() {
            window.location.href = `${API_URL}/export/txt`;
        }

        function backToHome() {
            window.location.href = '/index.html';
        }

        // ปิด Modal เมื่อคลิกนอกพื้นที่
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') {
                closeModal();
            }
        });
    </script>
</body>
</html>
